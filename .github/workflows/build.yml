name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        python build_exe.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BilibiliDashboard-EXE
        path: dist/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/B站数据看板.exe
        body: |
          ## B站数据看板 ${{ github.ref_name }}

          ### 功能特点
          - 实时粉丝数监控
          - 评论回复消息显示
          - 新关注蜂鸣1声提醒
          - 新回复蜂鸣3声提醒
          - 字号调节器（50%-150%）
          - 点击消息跳转到B站回复页面
          - 赛博朋克2077风格界面

          ### 使用方法
          1. 下载 `B站数据看板.exe`
          2. 双击运行即可
          3. 点击KEY按钮设置Cookie（可选，用于消息功能）
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}